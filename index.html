<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#dff5df;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            position:relative;
        }

        /* Logo */
        .logo{
            position:absolute;
            top:20px;
            left:20px;
        }

        .logo img{
            width:90px;
            height:auto;
        }

        .contenedor{
            background:#ffffff;
            width:100%;
            max-width:500px;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            color:#2e7d32;
            margin-bottom:25px;
        }

        .campo{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #b7d8b7;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
        }

        .campo:focus{
            outline:none;
            border-color:#4caf50;
            box-shadow:0 0 8px rgba(76,175,80,0.3);
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:13px;
            background:#4caf50;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#388e3c;
        }

        .titulo-universidad{
            text-align:center;
            color:#2e7d32;
            font-size:14px;
            margin-bottom:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <!-- Logo Universidad -->
    <div class="logo">
        <img src="logo-utlvte.png" alt="Logo UTLVTE">
    </div>

    <div class="contenedor">

        <div class="titulo-universidad">
            UNIVERSIDAD TÉCNICA LUIS VARGAS TORRES DE ESMERALDAS
        </div>

        <h2>Formulario de Contacto</h2>

        <form id="formulario">

            <input type="text" id="nombre" class="campo"
                   placeholder="Nombre completo" required>

            <input type="email" id="correo" class="campo"
                   placeholder="Correo electrónico" required>

            <textarea id="mensaje" class="campo"
                      placeholder="Escriba su mensaje..." required></textarea>

            <button type="submit">
                Enviar Información
            </button>

        </form>
    </div>

<script>
document.getElementById('formulario').addEventListener('submit', async function(e){

    e.preventDefault();

    const datos = {
        nombre: document.getElementById('nombre').value,
        correo: document.getElementById('correo').value,
        mensaje: document.getElementById('mensaje').value
    };

    try{
        const respuesta = await fetch(
            'https://cloud.activepieces.com/api/v1/webhooks/cVxY0DwXRoc8EQMltM7zd',
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify(datos)
            }
        );

        if(respuesta.ok){
            alert('Formulario enviado correctamente');
            document.getElementById('formulario').reset();
        }else{
            alert('Error al enviar el formulario');
        }

    }catch(error){
        alert('Error de conexión');
    }
});
</script>

</body>
</html>
