<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Contacto</title>

    <style>
        
        
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Fondo tipo agua */
    background:
    linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)),
    url('https://img.magnific.com/vector-gratis/fondo-escritorio-flores-vector-lindo_53876-136877.jpg?semt=ais_hybrid&w=740&q=80');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

form{
    background:rgba(255,255,255,0.9);
    padding:30px;
    border-radius:20px;
    width:400px;

    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    backdrop-filter:blur(5px);
}

h2{
    position:absolute;
    top:80px;
    color:rgb(0, 0, 0);
    font-size:32px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.4);
}

input,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #b7e4c7;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus,
textarea:focus{
    border-color:#52b788;
    box-shadow:0 0 8px rgba(82,183,136,0.5);
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#52b788;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#40916c;
    transform:scale(1.03);
}    
</style>

</head>
<body>

<h2>Formulario de Contacto</h2>

<form id="formulario">

    <input type="text"
           id="nombre"
           placeholder="Nombre"
           required>

    <br><br>

    <input type="email"
           id="correo"
           placeholder="Correo"
           required>

    <br><br>

    <textarea id="mensaje"
              placeholder="Mensaje"
              required></textarea>

    <br><br>

    <button type="submit">
        Enviar
    </button>

</form>

<script>

document.getElementById('formulario')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const datos = {
        nombre: document.getElementById('nombre').value,
        correo: document.getElementById('correo').value,
        mensaje: document.getElementById('mensaje').value
    };

    await fetch('https://melany-ar12.app.n8n.cloud/webhook-test/contacto', {
        method: 'POST',
        headers: {
            'Content-Type':'application/json'
        },
        body: JSON.stringify(datos)
    });

    alert('Formulario enviado');

});

</script>

</body>
</html>
